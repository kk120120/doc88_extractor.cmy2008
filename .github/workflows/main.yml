name: Build doc88_extractor Portable (Windows x64)

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: 'x64'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller retrying pypdf requests pywin32

    - name: Download JRE (Microsoft Build of OpenJDK 17)
      shell: powershell
      run: |
        Write-Host "Downloading Microsoft Build of OpenJDK 17..."
        $jreUrl = "https://aka.ms/download-jdk/microsoft-jdk-17.0.14-windows-x64.zip"
        $outputPath = "jre.zip"
        Invoke-WebRequest -Uri $jreUrl -OutFile $outputPath -UseBasicParsing
        
        Write-Host "Extracting JRE..."
        Expand-Archive -Path $outputPath -DestinationPath . -Force
        
        $jdkDir = Get-ChildItem -Directory -Filter "*jdk*" | Select-Object -First 1
        if ($jdkDir) {
            Rename-Item -Path $jdkDir.FullName -NewName "jre"
            Write-Host "JRE ready at: $(Get-Location)\jre"
        } else {
            Write-Host "Error: JDK directory not found!"
            exit 1
        }
        
        Remove-Item $outputPath -Force

    - name: Build with PyInstaller (Single Directory)
      run: |
        pyinstaller --clean --noconfirm main_portable.spec

    - name: Create launcher script
      shell: cmd
      run: |
        @echo off > dist\doc88_extractor\启动.bat
        @echo chcp 65001 ^>nul >> dist\doc88_extractor\启动.bat
        @echo title doc88_extractor >> dist\doc88_extractor\启动.bat
        @echo cd /d "%%~dp0" >> dist\doc88_extractor\启动.bat
        @echo. >> dist\doc88_extractor\启动.bat
        @echo REM Set up bundled JRE >> dist\doc88_extractor\启动.bat
        @echo if exist "jre" ( >> dist\doc88_extractor\启动.bat
        @echo     echo Using bundled Java... >> dist\doc88_extractor\启动.bat
        @echo     set "JAVA_HOME=%%~dp0jre" >> dist\doc88_extractor\启动.bat
        @echo     set "PATH=%%JAVA_HOME%%\bin;%%PATH%%" >> dist\doc88_extractor\启动.bat
        @echo ) >> dist\doc88_extractor\启动.bat
        @echo. >> dist\doc88_extractor\启动.bat
        @echo REM Run the main program >> dist\doc88_extractor\启动.bat
        @echo doc88_extractor.exe >> dist\doc88_extractor\启动.bat
        @echo. >> dist\doc88_extractor\启动.bat
        @echo if errorlevel 1 ( >> dist\doc88_extractor\启动.bat
        @echo     echo. >> dist\doc88_extractor\启动.bat
        @echo     echo Program exited with error code: %%errorlevel%% >> dist\doc88_extractor\启动.bat
        @echo     echo. >> dist\doc88_extractor\启动.bat
        @echo     pause >> dist\doc88_extractor\启动.bat
        @echo ) >> dist\doc88_extractor\启动.bat

    - name: Create README for package
      shell: cmd
      run: |
        @echo # doc88_extractor - Portable Version > dist\doc88_extractor\README.txt
        @echo. >> dist\doc88_extractor\README.txt
        @echo ## System Requirements >> dist\doc88_extractor\README.txt
        @echo - Windows 7 or later (64-bit) >> dist\doc88_extractor\README.txt
        @echo - No Python or Java installation required >> dist\doc88_extractor\README.txt
        @echo. >> dist\doc88_extractor\README.txt
        @echo ## Usage >> dist\doc88_extractor\README.txt
        @echo 1. Extract this folder to any location >> dist\doc88_extractor\README.txt
        @echo 2. Double-click "启动.bat" (Recommended) >> dist\doc88_extractor\README.txt
        @echo 3. Or run "doc88_extractor.exe" directly >> dist\doc88_extractor\README.txt
        @echo. >> dist\doc88_extractor\README.txt
        @echo ## Built-in Components >> dist\doc88_extractor\README.txt
        @echo - Python 3.10 (Packaged) >> dist\doc88_extractor\README.txt
        @echo - Microsoft Build of OpenJDK 17 >> dist\doc88_extractor\README.txt
        @echo - All dependencies included >> dist\doc88_extractor\README.txt
        @echo. >> dist\doc88_extractor\README.txt
        @echo ## Notes >> dist\doc88_extractor\README.txt
        @echo - ffdec tool will be downloaded on first run >> dist\doc88_extractor\README.txt
        @echo - PDF files will be saved in "docs" folder >> dist\doc88_extractor\README.txt

    - name: Package the distribution
      shell: powershell
      run: |
        $dateStr = Get-Date -Format 'yyyyMMdd'
        if ('${{ github.ref_name }}'.StartsWith('v')) {
            $version = '${{ github.ref_name }}'
        } else {
            $version = "dev-$dateStr"
        }
        $archiveName = "doc88_extractor-portable-windows-x64-$version"
        
        Write-Host "Creating 7z archive..."
        choco install 7zip -y
        7z a -t7z -m0=lzma2 -mx=9 -mfb=64 -md=32m -ms=on "$archiveName.7z" ".\dist\doc88_extractor\*"
        
        Write-Host "Creating zip archive..."
        Compress-Archive -Path "dist/doc88_extractor/*" -DestinationPath "$archiveName.zip" -Force
        
        echo "ARCHIVE_7Z=$archiveName.7z" >> $env:GITHUB_ENV
        echo "ARCHIVE_ZIP=$archiveName.zip" >> $env:GITHUB_ENV

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doc88_extractor-portable-windows-x64
        path: |
          ${{ env.ARCHIVE_7Z }}
          ${{ env.ARCHIVE_ZIP }}

    - name: Upload release assets
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ env.ARCHIVE_7Z }}
          ${{ env.ARCHIVE_ZIP }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
